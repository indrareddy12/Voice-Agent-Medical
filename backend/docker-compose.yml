version: '3.8'

services:
  voice-agent:
    build: .
    container_name: voice-agent-app
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # Persists the SQLite database on the host VM
      - ./aura_clinic.db:/workspace/aura_clinic.db
    restart: unless-stopped
